<div class="container">
  <div class="col-4 m-5">
<div *ngIf="dish">

  <mat-card class="example-card" appearance="outlined">

    <mat-card-header>
      <mat-card-title>
        {{ dish.name }}
      </mat-card-title>
    </mat-card-header>

    <img mat-card-image [src]="dish.image" [alt]="dish.name">

    <mat-card-content>
      <p>{{ dish.description }}</p>
    </mat-card-content>

    <mat-card-actions>
      <button mat-button>LIKE</button>
      <button mat-button>SHARE</button>
    </mat-card-actions>
  
  </mat-card>
</div>
</div>

  <!-- COMMENTS SECTION -->
  <div *ngIf="dish?.comments?.length">

    <h3>Comments</h3>

    <mat-list>
      <mat-list-item *ngFor="let comment of dish.comments">

        <span matListItemTitle>{{ comment.comment }}</span>

        <span matListItemLine>
          {{ comment.rating }} Stars
        </span>

        <span matListItemLine>
          {{ comment.author }} {{ comment.date | date:'shortDate' }}
        </span>

      </mat-list-item>
    </mat-list>

  </div>

</div>
