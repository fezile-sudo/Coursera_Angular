<div class="container">
<mat-grid-list cols="2" rowHeight="300px" gutterSize="30px">

  <mat-grid-tile *ngFor="let dish of dishes"
                 (click)="selectedDish = dish">

    <mat-card class="dish-card">

      <img mat-card-image [src]="dish.image" [alt]="dish.name">

      <mat-card-content>
        <h3>{{ dish.name }}</h3>
        <p>{{ dish.description | slice:0:60 }}...</p>
      </mat-card-content>

    </mat-card>

  </mat-grid-tile>

</mat-grid-list>
</div>
<div class="container">
<div class="detail-section" *ngIf="selectedDish">
<app-dishdetail *ngIf="selectedDish" [dish]="selectedDish"></app-dishdetail>
</div>
</div>
